<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Tính tổng</title>
</head>

<body>
<h2>Nhập số để tính tổng</h2>

<input type="text" name="SoHang1"> +
<input type="text" name="SoHang2"> =
<input type="text" name="KetQua" readonly>

<br><br>

<input type="button" value="Tính tổng" onclick="tinhTong()">

<script>
function tinhTong() {
    var a = parseFloat(document.getElementsByName("SoHang1")[0].value);
    var b = parseFloat(document.getElementsByName("SoHang2")[0].value);

    if (isNaN(a) || isNaN(b)) {
        alert("Nhập số hợp lệ!");
        return;
    }

    document.getElementsByName("KetQua")[0].value = a + b;
}
</script>

</body>
</html>
