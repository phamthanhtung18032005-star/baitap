!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính tuổi</title>
</head>

<body>
<script>
    var D = new Date();

    var NamHienTai = D.getFullYear();

    var NamSinh = prompt("Bạn sinh năm bao nhiêu?", "");

    var Tuoi = NamHienTai - NamSinh;

    alert("Tuổi của bạn hiện tại là: " + Tuoi);
</script>
</body>
</html>
